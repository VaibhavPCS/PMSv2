---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-auth
  namespace: pms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pms-auth
  template:
    metadata:
      labels:
        app: pms-auth
    spec:
      containers:
      - name: pms-auth
        image: YOUR_REGISTRY/pms-auth:latest
        ports:
        - containerPort: 4001
        envFrom:
        - secretRef:
            name: pms-env
        - configMapRef:
            name: pms-auth-config
        livenessProbe:
          httpGet:
            path: /api/v1/auth/me
            port: 4001
          initialDelaySeconds: 20
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/auth/me
            port: 4001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pms-auth
  namespace: pms
spec:
  selector:
    app: pms-auth
  ports:
  - port: 4001
    targetPort: 4001
